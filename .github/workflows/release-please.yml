on:
  workflow_call:
    inputs:
      release-type:
        required: false
        type: string
        default: "node"  # or "simple" for non-npm projects

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: ${{ inputs.release-type }}
          token: ${{ secrets.GITHUB_TOKEN }}
